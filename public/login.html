<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeprotection Nexus - Login</title>
    <link rel="icon" href="/login.ico" type="image/x-icon" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d1117;
            --surface:   #161b22;
            --border:    #30363d;
            --accent:    #58a6ff;
            --accent-dk: #1f6feb;
            --text:      #c9d1d9;
            --muted:     #8b949e;
            --danger:    #f85149;
            --success:   #3fb950;
            --radius:    8px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 380px;
            padding: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        /* 打字机效果样式 */
        .typing-container {
            display: inline-flex;
            align-items: center;
            min-height: 1.2em;
        }

        .typing-text {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid transparent;
            animation: none;
            color: var(--muted); /* 默认颜色 */
        }

        .typing-text.typing {
            border-right: 2px solid;
            animation: typing 0.5s steps(20, end), blink-caret 0.75s step-end infinite;
        }

        /* 错误状态 - 红色文字 */
        .typing-text.error-state {
            color: var(--danger);
        }

        /* 成功状态 - 绿色文字 */
        .typing-text.success-state {
            color: var(--success);
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: currentColor; }
        }

        input[type="password"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text);
            font-size: .95rem;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color .2s;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88,166,255,.15);
        }

        /* 按钮容器 */
        .btn-container {
            position: relative;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
        }

        .btn-login {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 11px;
            background: var(--accent-dk);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .04em;
            transition: background .2s, opacity .2s;
        }

        .btn-login:hover { background: var(--accent); }
        .btn-login:active { opacity: .85; }
        .btn-login:disabled { opacity: .5; cursor: not-allowed; }

        .hint {
            margin-top: 20px;
            font-size: .78rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
        }

        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: .3; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="login-wrapper">

        <div class="card">
            <div class="form-group">
                <label for="password">
                    <span id="label-text" class="typing-container">
                        <span class="typing-text">Admin Password</span>
                    </span>
                </label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" autofocus>
            </div>

            <div class="btn-container" id="btn-container">
                <button class="btn-login" id="login-btn">Authentication</button>
            </div>

            <p class="hint">
                <span class="status-dot"></span>
                System is running. Authorised access only.
            </p>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const loginBtn      = document.getElementById('login-btn');
        const labelText     = document.querySelector('.typing-text');
        const btnContainer  = document.getElementById('btn-container');

        // 保存原始标签文字
        const originalLabel = 'Admin Password';

        function typeText(element, text, speed = 50, state = 'normal') {
            element.textContent = '';
            element.classList.add('typing');

            // 根据状态设置颜色
            if (state === 'error') {
                element.classList.add('error-state');
            } else if (state === 'success') {
                element.classList.add('success-state');
            } else {
                element.classList.remove('error-state');
                element.classList.remove('success-state');
            }

            let i = 0;
            return new Promise(resolve => {
                const type = () => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        // 打字完成后，短暂显示光标，然后移除
                        setTimeout(() => {
                            element.classList.remove('typing');
                            resolve();
                        }, 800);
                    }
                };
                type();
            });
        }

        function resetLabel() {
            labelText.classList.remove('typing');
            labelText.classList.remove('error-state');
            labelText.classList.remove('success-state');
            labelText.textContent = originalLabel;
        }

        function showError(msg) {
            // 在label里以打字方式显示错误（红色）
            typeText(labelText, msg, 15, 'error');
        }

        function showSuccess(msg) {
            // 在label里以打字方式显示成功（绿色）
            typeText(labelText, msg, 15, 'success');

            // 延迟恢复原始label
            setTimeout(() => {
                resetLabel();
            }, 1200);
        }

        function clearAlerts() {
            resetLabel();
        }

        async function doLogin() {
            clearAlerts();
            const password = passwordInput.value;
            if (!password) {
                showError('Please enter your password.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in…';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('Authentication successful.');
                    setTimeout(() => { window.location.href = '/'; }, 800);
                } else {
                    showError(data.error || 'Login failed.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Authentication';
                    passwordInput.select();
                }
            } catch (err) {
                showError('Network error. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Authentication';
            }
        }

        loginBtn.addEventListener('click', doLogin);
        passwordInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
